name: Build and publish to FlakeHub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux
          - os: macos-15
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-cache-action@main
      # NOTE: we run `build` + `lint` rather than the full `just` default
      # (which includes `test`). treelint inherits treefmt's integration suite,
      # which needs many external formatters on PATH that the devshell does not
      # yet provision; wiring those up is tracked separately. Build + the
      # read-only formatting gate are green and worth enforcing now.
      - run: nix develop -c just build
      - run: nix develop -c just lint

  flakehub-publish:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-push@main
        with:
          name: "amarbel-llc/treelint"
          rolling: true
          visibility: "public"
          include-output-paths: true
