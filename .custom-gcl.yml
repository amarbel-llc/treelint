# Custom golangci-lint build manifest (golangci-lint v2 module-plugin system).
# Declares the dewey static analyzers (defererr/seqerror/repool, + opt-in
# actx/paramobj) so they ride the golangci-lint lane. conformist#10.
#
# conformist consumes a prebuilt custom binary from purse-first's flake output
# (packages.<system>.golangci-lint-dewey, purse-first#134) rather than running
# `golangci-lint custom` itself, so this manifest documents the wiring and lets
# the golangci-dewey self-lint confirm a golangci-gating repo declares the plugin.
# Keep the version in sync with the purse-first build (currently v2.12.2).
version: v2.12.2
plugins:
  - module: github.com/amarbel-llc/purse-first/libs/dewey
    import: github.com/amarbel-llc/purse-first/libs/dewey/gclplugin
    version: latest
